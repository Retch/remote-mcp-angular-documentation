services:
  ollama-embeddings:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11437:11434"
    volumes:
      - ollama_embeddings_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=4h
    entrypoint: >
      sh -c "
      ollama serve &
      sleep 2 &&
      ollama ls | grep qwen3-embedding:0.6b ||
      ollama pull qwen3-embedding:0.6b &&
      wait
      "
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
  angular-docs-mcp:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.mcp_server
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_BASE_URL=http://ollama-embeddings:11434
    depends_on:
      - qdrant
      - ollama-embeddings
  angular-docs-ingestion:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.ingestion
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_BASE_URL=http://ollama-embeddings:11434

volumes:
  ollama_embeddings_data:
  qdrant_data:
